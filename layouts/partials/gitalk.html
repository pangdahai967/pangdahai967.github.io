{{ if .Site.Params.enableGitalk }}
<div id="gitalk-container" class="gitalk-container"></div>
<link rel="stylesheet" href='{{ "css/gitalk.css" | relURL }}'>
<script src='{{ "js/gitalk.min.js" | relURL }}'></script>
<script>
  (function() {
    let cfgRaw;
    try {
      cfgRaw = JSON.parse('{{ .Site.Params.gitalk | jsonify | safeJS }}');
    } catch (e) {
      console.error('Gitalk 配置解析失败(JSON.parse)：', e);
      return;
    }

    // 规范化配置与宽松兼容（clientID/clientId）
    const cfg = {
      clientID: (cfgRaw && (cfgRaw.clientID || cfgRaw.clientId || cfgRaw.clientid)) || '',
      clientSecret: (cfgRaw && (cfgRaw.clientSecret || cfgRaw.clientsecret)) || '',
      repo: (cfgRaw && (cfgRaw.repo)) || '',
      owner: (cfgRaw && (cfgRaw.owner)) || '',
      admin: cfgRaw && (cfgRaw.admin),
      labels: cfgRaw && (cfgRaw.labels),
      perPage: cfgRaw && (cfgRaw.perPage || cfgRaw.perpage),
      pagerDirection: cfgRaw && (cfgRaw.pagerDirection || cfgRaw.pagerdirection),
      createIssueManually: cfgRaw && (cfgRaw.createIssueManually || cfgRaw.createissuemanually),
      distractionFreeMode: cfgRaw && (cfgRaw.distractionFreeMode || cfgRaw.distractionfreemode),
      proxy: cfgRaw && (cfgRaw.proxy),
      id: cfgRaw && (cfgRaw.id)
    };

    const missing = [];
    if (!String(cfg.clientID).trim()) missing.push('clientID');
    if (!String(cfg.repo).trim()) missing.push('repo');
    if (!String(cfg.owner).trim()) missing.push('owner');
    console.debug('Gitalk cfg =', cfg, 'missing =', missing);
    if (missing.length) {
      console.error('Gitalk 配置不完整，请在 hugo.toml 的 [params.gitalk] 中设置：' + missing.join('/'));
      return;
    }
    const idExpr = (cfg.id || 'location.pathname');
    let computedId;
    try {
      // 仅允许两种常见表达式，避免任意 eval 风险
      if (idExpr === 'location.pathname') {
        computedId = location.pathname;
      } else if (idExpr === 'location.href') {
        computedId = location.href;
      } else {
        computedId = String(idExpr);
      }
      // Gitalk 限制 id 长度 < 50
      if (computedId.length > 49) {
        computedId = computedId.substring(0, 49);
      }
    } catch (e) {
      computedId = location.pathname.substring(0, 49);
    }

    const labelsArr = Array.isArray(cfg.labels) ? cfg.labels : (cfg.labels ? [cfg.labels] : ["gitalk"]);

    const gitalk = new Gitalk({
      clientID: cfg.clientID,
      clientSecret: cfg.clientSecret,
      repo: cfg.repo,
      owner: cfg.owner,
      admin: Array.isArray(cfg.admin) && cfg.admin.length ? cfg.admin : [cfg.owner],
      labels: labelsArr,
      perPage: cfg.perPage || 30,
      pagerDirection: cfg.pagerDirection || 'last',
      createIssueManually: !!cfg.createIssueManually,
      distractionFreeMode: !!cfg.distractionFreeMode,
      proxy: cfg.proxy,
      id: computedId
    });
    gitalk.render('gitalk-container');
  })();
</script>
{{ end }}
